<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جامع الكوثر – تسجيل الدخول</title>
<link rel="stylesheet" href="/style.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
body::before, body::after { content:''; }

.login-wrap {
  width: 100%;
  max-width: 420px;
  padding: 2rem;
  position: relative;
  z-index: 1;
}

.login-logo {
  text-align: center;
  margin-bottom: 2rem;
}

.mosque-svg {
  width: 90px;
  height: 90px;
  margin: 0 auto 1rem;
  display: block;
}

.login-logo h1 {
  font-family: 'Amiri', serif;
  font-size: 1.8rem;
  color: var(--gold);
  margin-bottom: 4px;
}

.login-logo p {
  color: var(--text-muted);
  font-size: 0.82rem;
}

.login-card {
  background: rgba(22,61,38,0.7);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 2rem;
  backdrop-filter: blur(16px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.login-card h2 {
  font-size: 1.1rem;
  color: var(--gold-light);
  margin-bottom: 1.5rem;
  text-align: center;
}

.btn-login {
  width: 100%;
  padding: 12px;
  justify-content: center;
  font-size: 1rem;
  margin-top: 0.5rem;
  border-radius: 12px;
}

.error-msg {
  background: rgba(192,57,43,0.15);
  border: 1px solid rgba(192,57,43,0.3);
  color: #e88;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  display: none;
}

.divider {
  border: none;
  border-top: 1px solid var(--card-border);
  margin: 1.5rem 0 1rem;
}

.hint-text {
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* Animated stars / dots */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--gold);
  border-radius: 50%;
  opacity: 0;
  animation: twinkle var(--d, 4s) var(--delay, 0s) infinite;
}
@keyframes twinkle {
  0%,100% { opacity:0; transform:scale(1); }
  50%      { opacity:0.6; transform:scale(1.5); }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="login-wrap">
  <div class="login-logo">
    <!-- Mosque / Minaret SVG logo matching the sign -->
    <svg class="mosque-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer glow circle -->
      <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
      <!-- Minaret body -->
      <rect x="43" y="20" width="14" height="50" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
      <!-- Minaret top dome -->
      <path d="M43 20 Q50 8 57 20Z" fill="#c9a84c" opacity="0.9"/>
      <!-- Crescent on top -->
      <path d="M48 11 Q50 7 52 11 Q50 9.5 48 11Z" fill="#c9a84c"/>
      <!-- Balcony -->
      <rect x="40" y="38" width="20" height="3" rx="1.5" fill="#c9a84c" opacity="0.7"/>
      <!-- Mosque base / dome -->
      <path d="M20 70 Q50 42 80 70Z" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
      <!-- Mosque base rect -->
      <rect x="20" y="70" width="60" height="16" rx="3" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
      <!-- Door -->
      <path d="M45 86 L45 76 Q50 71 55 76 L55 86Z" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
      <!-- Windows -->
      <circle cx="32" cy="75" r="3" fill="none" stroke="#c9a84c" stroke-width="1"/>
      <circle cx="68" cy="75" r="3" fill="none" stroke="#c9a84c" stroke-width="1"/>
      <!-- Stars decoration -->
      <text x="50" y="98" text-anchor="middle" font-size="7" fill="#c9a84c" opacity="0.6">✦ ✦ ✦</text>
    </svg>
    <h1>جامع الكوثر</h1>
    <p>إدارة الحلقات التربوية · دعوة – تزكية – علم</p>
  </div>

  <div class="login-card">
    <h2>تسجيل الدخول</h2>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label>البريد الإلكتروني</label>
      <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-login" id="loginBtn" onclick="doLogin()">
      دخول
    </button>
    <hr class="divider">
    <p class="hint-text">للتواصل مع المشرف العام لإنشاء حسابك</p>
  </div>
</div>

<div id="toast"></div>
<script src="/app.js"></script>
<script>
// Redirect if already logged in
const u = getUser();
if (u) {
  if (u.role === 'admin')   window.location.href = '/admin';
  else if (u.role === 'teacher') window.location.href = '/teacher';
  else window.location.href = '/parent';
}

// Generate twinkling stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --d:${3+Math.random()*5}s;
    --delay:${Math.random()*6}s;
  `;
  starsEl.appendChild(s);
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('errorMsg');
  const btn      = document.getElementById('loginBtn');

  if (!email || !password) {
    errEl.textContent = 'يرجى إدخال البريد وكلمة المرور';
    errEl.style.display = 'block';
    return;
  }

  btn.textContent = 'جاري الدخول…';
  btn.disabled = true;
  errEl.style.display = 'none';

  try {
    const data = await apiFetch('/auth/login', { method:'POST', body:{ email, password } });
    setAuth(data.token, data.user);
    if (data.user.role === 'admin')        window.location.href = '/admin';
    else if (data.user.role === 'teacher') window.location.href = '/teacher';
    else                                   window.location.href = '/parent';
  } catch(err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.textContent = 'دخول';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
